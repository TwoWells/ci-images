name: Build CI images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - { name: rust-ci, file: Dockerfile.rust-ci }
          # - { name: omnidsp-ci, file: Dockerfile.omnidsp-ci }  # FROM rust-ci + Intel MKL/IPP (later)
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.file }}
          push: true
          tags: ghcr.io/twowells/${{ matrix.image.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
